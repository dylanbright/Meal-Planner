<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dinner Repertoire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Dinner Repertoire</h1>
    <div class="header-actions">
      <button id="addBtn" class="btn btn-primary">+ Add Meal</button>
    </div>
  </header>

  <main>
    <!-- Left: meal repertoire -->
    <div class="repertoire-col">
      <div id="searchBar">
        <input type="text" id="searchInput" placeholder="Search meals..." autocomplete="off">
      </div>
      <div id="mealGrid"></div>
      <p id="emptyState" class="empty-state hidden">No meals yet. Add your first one!</p>
    </div>

    <!-- Right: weekly plan -->
    <aside class="plan-col">
      <div class="plan-header">
        <h2 class="plan-title">This Week</h2>
        <button class="btn-icon" id="clearPlanBtn">Clear</button>
      </div>
      <div id="planDropZone" class="plan-drop-zone">
        <div id="planEmptyMsg" class="plan-empty-msg">Drag meals here to plan your week</div>
        <ul id="planList" class="plan-list"></ul>
      </div>
      <div class="plan-footer">
        <div id="planSummary" class="plan-summary"></div>
        <button id="generateFromPlanBtn" class="btn btn-primary btn-block" disabled>Generate Shopping List</button>
      </div>
    </aside>
  </main>

  <!-- Meal Form Modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Meal</h2>
        <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      </div>
      <form id="mealForm" novalidate>
        <input type="hidden" id="mealId">

        <div class="form-group">
          <label for="mealName">Meal Name <span class="required">*</span></label>
          <input type="text" id="mealName" placeholder="e.g. Chicken Tikka Masala" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="mealNights">Nights it provides</label>
            <input type="number" id="mealNights" min="1" max="14" value="1">
          </div>
          <div class="form-group flex-grow">
            <label for="mealRecipe">Recipe Link</label>
            <div class="recipe-url-row">
              <input type="url" id="mealRecipe" placeholder="https://...">
              <button type="button" id="fetchIngredientsBtn" class="btn btn-secondary" disabled>Fetch Ingredients</button>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="mealLastHad">Last time we had it</label>
          <div class="date-input-row">
            <input type="date" id="mealLastHad">
            <button type="button" id="todayBtn" class="btn btn-secondary">Today</button>
          </div>
        </div>

        <div class="form-group">
          <label for="mealNotes">Notes</label>
          <textarea id="mealNotes" rows="3" placeholder="Cooking tips, variations, family preferences..."></textarea>
        </div>

        <div class="form-group">
          <label for="ingredientInput">Special Ingredients <span class="label-hint">(items to flag in shopping lists)</span></label>
          <div class="ingredient-input-row">
            <input type="text" id="ingredientInput" placeholder="Add an ingredient and press Enter">
            <button type="button" id="addIngredientBtn" class="btn btn-secondary">Add</button>
          </div>
          <div id="ingredientTags" class="ingredient-tags"></div>
        </div>

        <div class="form-group">
          <div class="form-label-row">
            <label for="mealIngredients">Recipe Ingredients <span class="label-hint">(for shopping lists)</span></label>
            <span id="fetchStatus" class="fetch-status"></span>
          </div>
          <textarea id="mealIngredients" rows="6" placeholder="Paste anything from the recipe — ingredients, instructions, the whole page. Click &quot;Clean up with AI&quot; to extract just the ingredients."></textarea>
          <button type="button" id="parseIngredientsBtn" class="btn btn-secondary btn-block">Clean up with AI</button>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Meal</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete confirm dialog -->
  <div id="deleteDialog" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-sm">
      <h2>Delete meal?</h2>
      <p id="deleteDialogMsg"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="deleteCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="deleteConfirmBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- Shopping List Modal -->
  <div id="shoppingModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-lg">

      <!-- Step 1: Select meals (used when opened from header) -->
      <div id="shoppingStep1">
        <div class="modal-header">
          <h2>Shopping List</h2>
          <button class="modal-close" id="shoppingClose" aria-label="Close">&times;</button>
        </div>
        <p class="modal-subtitle">Select the meals you're planning for</p>
        <div id="shoppingMealList" class="shopping-meal-list"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="shoppingCancelBtn">Cancel</button>
          <button class="btn btn-primary" id="buildListBtn" disabled>Build List</button>
        </div>
      </div>

      <!-- Step 2: Ingredient list -->
      <div id="shoppingStep2" class="hidden">
        <div class="modal-header">
          <h2>Shopping List</h2>
          <button class="modal-close" id="shoppingClose2" aria-label="Close">&times;</button>
        </div>
        <div id="shoppingListContent" class="shopping-list-content"></div>
        <div class="cost-section">
          <button id="estimateCostBtn" class="btn btn-secondary btn-block">Estimate Cost with AI</button>
          <div id="costResult" class="cost-result hidden"></div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="backToMealsBtn">← Back</button>
          <button class="btn btn-primary" id="printListBtn">Print</button>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
